<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Commandes — ÉLÉGANCE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header-container"></div>

  <main class="account-page">
    <div class="container">
      <div class="account-layout">

        <!-- Sidebar -->
        <aside class="account-sidebar">
          <div class="account-sidebar-title" id="sidebar-name">Mon Compte</div>
          <div class="account-sidebar-email" id="sidebar-email"></div>
          <ul class="account-nav">
            <li><a href="account.html">Tableau de bord</a></li>
            <li><a href="orders.html" class="active">Mes commandes</a></li>
            <li><a href="account.html#wishlist">Mes favoris</a></li>
            <li><a href="account.html#addresses">Mes adresses</a></li>
            <li><a href="account.html#profile">Informations personnelles</a></li>
            <li><a href="javascript:void(0)" onclick="Auth.logout()" style="color:var(--color-text-light)">Se déconnecter</a></li>
          </ul>
        </aside>

        <!-- Contenu -->
        <div class="account-content">
          <div class="account-section-title">Mes Commandes</div>
          <div id="orders-content">
            <div class="skeleton" style="height:60px;margin-bottom:0.5rem"></div>
            <div class="skeleton" style="height:60px;margin-bottom:0.5rem"></div>
            <div class="skeleton" style="height:60px;margin-bottom:0.5rem"></div>
          </div>

          <!-- Détail commande (modal) -->
          <div id="order-detail" class="hidden" style="margin-top:2rem">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
              <h3 style="font-family:var(--font-serif);font-size:1.5rem">Commande <span id="detail-number"></span></h3>
              <button onclick="closeDetail()" class="btn btn-secondary btn-sm">← Retour</button>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem">
              <div style="background:var(--color-bg-alt);padding:1.2rem">
                <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.8rem">Adresse de livraison</div>
                <div id="detail-address" style="font-size:0.82rem;font-weight:300;line-height:1.8"></div>
              </div>
              <div style="background:var(--color-bg-alt);padding:1.2rem">
                <div style="font-size:0.65rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.8rem">Informations de commande</div>
                <div id="detail-info" style="font-size:0.82rem;font-weight:300;line-height:1.8"></div>
              </div>
            </div>

            <table class="orders-table" style="margin-bottom:1.5rem">
              <thead>
                <tr>
                  <th style="text-align:left">Article</th>
                  <th>Taille</th>
                  <th>Couleur</th>
                  <th>Quantité</th>
                  <th style="text-align:right">Prix</th>
                </tr>
              </thead>
              <tbody id="detail-items"></tbody>
            </table>

            <div style="max-width:300px;margin-left:auto">
              <div class="summary-row"><span>Sous-total</span><span id="detail-subtotal"></span></div>
              <div class="summary-row"><span>Livraison</span><span id="detail-shipping"></span></div>
              <div class="summary-row total"><span>Total</span><span id="detail-total"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) {}

    const user = Auth.getUser();
    if (user) {
      document.getElementById('sidebar-name').textContent = `${user.first_name} ${user.last_name}`;
      document.getElementById('sidebar-email').textContent = user.email;
    }

    async function loadOrders() {
      const container = document.getElementById('orders-content');
      try {
        const orders = await Api.orders.list();
        if (!orders.length) {
          container.innerHTML = `
            <div style="text-align:center;padding:4rem 0">
              <p style="font-family:var(--font-serif);font-size:2rem;margin-bottom:1rem">Aucune commande</p>
              <p class="text-light" style="margin-bottom:2rem">Vous n'avez pas encore passé de commande.</p>
              <a href="category.html" class="btn btn-primary">Découvrir notre collection</a>
            </div>`;
          return;
        }
        container.innerHTML = `
          <table class="orders-table">
            <thead>
              <tr>
                <th>N° Commande</th>
                <th>Date</th>
                <th>Articles</th>
                <th>Total</th>
                <th>Statut</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(o => `
                <tr>
                  <td><strong>${o.order_number}</strong></td>
                  <td>${formatDate(o.created_at)}</td>
                  <td>${(o.items || []).length} article${(o.items || []).length > 1 ? 's' : ''}</td>
                  <td><strong>${formatPrice(o.total)}</strong></td>
                  <td><span class="order-status status-${o.status}">${getStatusLabel(o.status)}</span></td>
                  <td><button onclick="viewOrder('${o.order_number}')" class="btn-link">Voir le détail</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      } catch (e) {
        container.innerHTML = `<p class="text-light">Impossible de charger vos commandes. ${e.message}</p>`;
      }
    }

    function getStatusLabel(status) {
      const labels = {
        en_attente: 'En attente',
        confirmee: 'Confirmée',
        expediee: 'Expédiée',
        livree: 'Livrée',
        annulee: 'Annulée',
      };
      return labels[status] || status;
    }

    async function viewOrder(orderNumber) {
      document.getElementById('orders-content').classList.add('hidden');
      const detail = document.getElementById('order-detail');
      detail.classList.remove('hidden');
      document.getElementById('detail-number').textContent = `#${orderNumber}`;

      try {
        const order = await Api.orders.get(orderNumber);
        const addr = order.shipping_address || {};

        document.getElementById('detail-address').innerHTML = `
          <strong>${addr.first_name || ''} ${addr.last_name || ''}</strong><br>
          ${addr.address || ''}${addr.address2 ? ', ' + addr.address2 : ''}<br>
          ${addr.postal_code || ''} ${addr.city || ''}, ${addr.country || ''}
        `;

        document.getElementById('detail-info').innerHTML = `
          Date : ${formatDate(order.created_at)}<br>
          Statut : <span class="order-status status-${order.status}">${getStatusLabel(order.status)}</span><br>
          Paiement : ${order.payment_method || 'Carte'}${order.payment_last_four ? ` (****${order.payment_last_four})` : ''}
        `;

        document.getElementById('detail-items').innerHTML = (order.items || []).map(item => `
          <tr>
            <td>
              <strong>${item.product_name}</strong>
            </td>
            <td style="text-align:center">${item.size || '—'}</td>
            <td style="text-align:center">${item.color || '—'}</td>
            <td style="text-align:center">${item.quantity}</td>
            <td style="text-align:right">${formatPrice(item.product_price * item.quantity)}</td>
          </tr>
        `).join('');

        document.getElementById('detail-subtotal').textContent = formatPrice(order.subtotal);
        document.getElementById('detail-shipping').textContent = order.shipping_cost === 0 ? 'Offerte' : formatPrice(order.shipping_cost);
        document.getElementById('detail-total').textContent = formatPrice(order.total);
      } catch (e) {
        Toast.error(`Erreur : ${e.message}`);
        closeDetail();
      }
    }

    function closeDetail() {
      document.getElementById('order-detail').classList.add('hidden');
      document.getElementById('orders-content').classList.remove('hidden');
    }

    loadOrders();
  </script>
</body>
</html>
